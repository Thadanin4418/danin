name: soranin
options:
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: soranin
    PRODUCT_BUNDLE_IDENTIFIER: com.nin.soranin
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_VERSION: 6.0
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 8Y29A7CLQ8
targets:
  soranin:
    type: application
    platform: iOS
    sources:
      - path: soranin
    resources:
      - path: soranin/Resources/Assets.xcassets
    info:
      path: soranin/Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleDisplayName: soranin
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSSupportsOpeningDocumentsInPlace: true
        NSMicrophoneUsageDescription: "soranin uses the microphone so you can talk to AI Chat."
        NSPhotoLibraryAddUsageDescription: "soranin saves finished video downloads to your Photos library automatically."
        NSSpeechRecognitionUsageDescription: "soranin uses speech recognition to turn your voice into AI Chat text."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UIFileSharingEnabled: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_MODULE_NAME: soranin
        INFOPLIST_FILE: soranin/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        DEVELOPMENT_ASSET_PATHS: "\"soranin/Resources/Preview Content\""
    scheme:
      gatherCoverageData: false
